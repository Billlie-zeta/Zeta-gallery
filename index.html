<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Billlie · Zeta</title>

<!-- ▼▼▼ 제목/부제는 여기 두 줄만 바꾸면 됩니다 ▼▼▼ -->
<script>
  const SITE = {
    title: "𝑩𝒊𝒍𝒍𝒍𝒊𝒆 𝒁𝒆𝒕𝒂 𝒑𝒍𝒐𝒕 𝒈𝒂𝒍𝒍𝒆𝒓𝒚",
    subtitle: "플롯을 만들면서 생성한 미공개 일러스트",
    brand: "Billlie · Zeta",
  };
</script>
<!-- ▲▲▲ ------------------------------------------ ▲▲▲ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<!-- GOATCOUNTER: 여기에 붙여넣기 (goatcounter.com 가입 후 받은 <script> 한 줄. 방문자 분석을 안 붙일 거면 이 줄은 무시하면 됩니다.) -->

<style>
  :root{
    --pageBg: radial-gradient(circle at 18% 8%, rgba(130,100,230,.34) 0%, transparent 52%),
              radial-gradient(circle at 86% 12%, rgba(235,145,110,.26) 0%, transparent 48%),
              radial-gradient(circle at 62% 92%, rgba(85,145,225,.30) 0%, transparent 55%),
              linear-gradient(160deg,#141220,#181725);
    --blob1: rgba(150,120,240,.5);
    --blob2: rgba(240,150,120,.4);
    --blob3: rgba(90,150,230,.46);
    --barBg: rgba(22,20,34,.55);
    --hair: rgba(255,255,255,.09);
    --glassBg: rgba(255,255,255,.07);
    --glassBorder: rgba(255,255,255,.15);
    --inputBg: rgba(255,255,255,.07);
    --drawerBg: rgba(24,22,36,.82);
    --modalCard: rgba(28,26,42,.80);
    --mediaMat: rgba(255,255,255,.05);
    --text: #ecebf6;
    --subtext: #a7a4bd;
    --accent: #ab9bf2;
    --accentGrad: linear-gradient(135deg,#ab9bf2,#f0a888);
    --accentText: #b6a8f5;
    --accentSoft: rgba(171,155,242,.18);
    --overlayGrad: linear-gradient(to top, rgba(0,0,0,.62), transparent 60%);
    --cardShadow: 0 18px 40px -20px rgba(0,0,0,.7);
    --cardShadowHover: 0 30px 60px -22px rgba(0,0,0,.8);
    --modalBackdrop: rgba(8,6,14,.6);
    --disp: 'Poppins', 'Pretendard', sans-serif;
    --body: 'Pretendard', system-ui, sans-serif;
  }
  @keyframes bzFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(0,-26px) scale(1.04)}}
  @keyframes bzFade{from{opacity:0}to{opacity:1}}
  @keyframes bzPop{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
  @keyframes bzSlide{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:none}}

  *{box-sizing:border-box;margin:0;padding:0}
  *::-webkit-scrollbar{width:8px;height:8px}
  *::-webkit-scrollbar-thumb{background:rgba(140,140,170,.35);border-radius:99px}
  input::placeholder{color:var(--subtext);opacity:.75}

  body{
    font-family:var(--body);
    background:var(--pageBg);
    background-attachment:fixed;
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    position:relative;
    overflow-x:hidden;
  }

  /* floating blobs */
  .blobs{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .blobs span{position:absolute;border-radius:50%;filter:blur(64px)}
  .blobs .b1{top:-8%;left:-12%;width:46%;height:44%;opacity:.75;background:var(--blob1);animation:bzFloat 14s ease-in-out infinite}
  .blobs .b2{top:8%;right:-14%;width:44%;height:42%;opacity:.7;background:var(--blob2);animation:bzFloat 18s ease-in-out infinite reverse}
  .blobs .b3{bottom:-14%;left:18%;width:52%;height:46%;opacity:.6;background:var(--blob3);animation:bzFloat 22s ease-in-out infinite}

  .wrap{position:relative;z-index:1}

  /* top bar */
  .bar{
    position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
    padding:12px clamp(16px,4vw,40px);
    background:var(--barBg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid var(--hair);
  }
  .bar .menu-btn{
    flex:none;width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    border-radius:12px;border:1px solid var(--glassBorder);background:var(--glassBg);
    backdrop-filter:blur(10px);cursor:pointer;color:var(--text);font-size:17px;
  }
  .bar .brand{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:-.01em}
  .bar .filter-label{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--subtext)}
  .bar .filter-label .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}

  main{max-width:1120px;margin:0 auto}

  .hero{padding:clamp(24px,5vw,48px) clamp(16px,4vw,40px) 6px}
  .hero .kicker{font-family:monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accentText)}
  .hero h1{font-family:var(--disp);font-weight:700;font-size:clamp(30px,6vw,52px);line-height:1.04;margin-top:12px;letter-spacing:-.025em}
  .hero p{max-width:520px;margin-top:14px;font-size:clamp(14px,1.5vw,16px);line-height:1.65;color:var(--subtext)}
  .hero .back{
    margin-top:18px;padding:9px 16px;border-radius:999px;border:1px solid var(--glassBorder);
    background:var(--glassBg);backdrop-filter:blur(10px);color:var(--text);font-size:13px;font-weight:600;
    font-family:inherit;cursor:pointer;
  }

  .searchrow{padding:22px clamp(16px,4vw,40px) 4px}
  .search{
    display:flex;align-items:center;gap:9px;max-width:340px;padding:11px 15px;border-radius:14px;
    background:var(--inputBg);border:1px solid var(--glassBorder);backdrop-filter:blur(10px);
  }
  .search input{flex:1;min-width:0;border:none;background:transparent;outline:none;color:var(--text);font-size:14px;font-family:inherit}
  .search .clear{border:none;background:transparent;cursor:pointer;color:var(--subtext);font-size:14px}

  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:16px clamp(16px,4vw,40px) 4px}
  .chip{
    padding:7px 13px;border-radius:999px;cursor:pointer;font-size:12.5px;font-weight:500;font-family:inherit;
    border:1px solid var(--glassBorder);background:var(--glassBg);color:var(--subtext);transition:all .2s ease;
  }
  .chip.on{border-color:transparent;font-weight:600;background:var(--accentGrad);color:#fff}
  .sortbtn{
    margin-left:auto;padding:7px 13px;border-radius:999px;cursor:pointer;font-size:12.5px;font-weight:600;
    font-family:inherit;border:1px solid var(--glassBorder);background:var(--glassBg);color:var(--subtext);
    display:flex;align-items:center;gap:6px;
  }

  .count{padding:12px clamp(16px,4vw,40px) 4px;font-size:13px;color:var(--subtext)}

  .grid-wrap{padding:8px clamp(16px,4vw,40px) 56px}
  .grid{column-width:238px;column-gap:18px}
  .card{
    break-inside:avoid;-webkit-column-break-inside:avoid;margin:0 0 18px;border-radius:22px;overflow:hidden;
    cursor:pointer;border:1px solid var(--glassBorder);box-shadow:var(--cardShadow);
    transition:transform .28s cubic-bezier(.2,.7,.3,1),box-shadow .28s ease;position:relative;background:var(--glassBg);
  }
  .card:hover,.card:focus-visible{transform:translateY(-6px);box-shadow:var(--cardShadowHover);outline:none;border-color:rgba(171,155,242,.5)}
  .card img{display:block;width:100%;height:auto}
  .card .cap{position:absolute;left:0;right:0;bottom:0;padding:14px 15px;background:var(--overlayGrad)}
  .card .cap .t{color:#fff;font-weight:600;font-size:15px;line-height:1.3;text-shadow:0 1px 8px rgba(0,0,0,.35)}
  .card .cap .m{color:rgba(255,255,255,.82);font-size:12px;margin-top:3px}

  .empty{text-align:center;padding:64px 20px;color:var(--subtext)}
  .empty .ic{font-size:34px;margin-bottom:10px;opacity:.6}
  .empty .h{font-size:15px;font-weight:600;color:var(--text)}
  .empty .s{font-size:13px;margin-top:6px;line-height:1.7}
  .empty code{font-family:var(--body);color:var(--text);background:var(--glassBg);border:1px solid var(--glassBorder);padding:2px 7px;border-radius:6px}

  /* drawer */
  .scrim{position:fixed;inset:0;z-index:30;background:var(--modalBackdrop);backdrop-filter:blur(4px);animation:bzFade .2s ease}
  .drawer{
    position:fixed;top:0;left:0;bottom:0;z-index:31;width:min(320px,84%);display:flex;flex-direction:column;
    background:var(--drawerBg);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    border-right:1px solid var(--glassBorder);box-shadow:var(--cardShadowHover);animation:bzSlide .28s cubic-bezier(.2,.7,.3,1);
  }
  .drawer .dhead{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 14px;border-bottom:1px solid var(--hair)}
  .drawer .dhead .k{font-family:monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accentText)}
  .drawer .dhead .tt{font-family:var(--disp);font-weight:700;font-size:18px;margin-top:4px}
  .drawer .dclose{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    border:1px solid var(--glassBorder);background:var(--glassBg);color:var(--subtext);cursor:pointer}
  .drawer .dlist{flex:1;overflow-y:auto;padding:12px 12px 20px}
  .mitem{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:11px 13px;margin-bottom:4px;
    border-radius:14px;border:none;cursor:pointer;font-family:inherit;background:transparent;color:var(--text)}
  .mitem.on{background:var(--accentSoft)}
  .mitem .col{display:flex;flex-direction:column;align-items:flex-start;min-width:0;flex:1}
  .mitem .nm{font-weight:600;font-size:14.5px}
  .mitem .sb{font-size:11.5px;opacity:.7;margin-top:2px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mitem .cnt{flex:none;min-width:26px;text-align:center;padding:3px 8px;border-radius:999px;font-size:11.5px;font-weight:600;
    background:var(--glassBg);color:var(--subtext);border:1px solid var(--glassBorder)}
  .mitem.on .cnt{background:var(--accentGrad);color:#fff;border-color:transparent}

  /* modal — aspect-ratio adaptive */
  .modal-scrim{
    position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;
    padding:clamp(14px,3vw,32px);background:var(--modalBackdrop);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);animation:bzFade .22s ease;
  }
  .modal-card{
    width:fit-content;min-width:min(330px,92vw);max-width:min(680px,94vw);max-height:94vh;overflow-y:auto;
    border-radius:26px;border:1px solid var(--glassBorder);background:var(--modalCard);
    backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);box-shadow:var(--cardShadowHover);
    animation:bzPop .3s cubic-bezier(.2,.7,.3,1);
  }
  .modal-media{position:relative;display:flex;align-items:center;justify-content:center;background:var(--mediaMat);border-radius:26px 26px 0 0}
  .modal-media img{display:block;max-width:min(680px,94vw);max-height:64vh;width:auto;height:auto;border-radius:26px 26px 0 0}
  .modal-close{position:absolute;top:15px;right:15px;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.18);color:#fff;cursor:pointer;
    backdrop-filter:blur(16px) saturate(1.7);box-shadow:0 4px 16px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.55)}
  .modal-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.35);
    background:rgba(255,255,255,.14);color:#fff;cursor:pointer;backdrop-filter:blur(14px)}
  .modal-nav.prev{left:12px}
  .modal-nav.next{right:12px}
  .modal-body{padding:22px clamp(20px,4vw,30px) 28px}
  .modal-body .story{font-family:monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accentText)}
  .modal-body h2{font-family:var(--disp);font-weight:700;font-size:clamp(20px,4vw,27px);line-height:1.15;margin:8px 0 0}
  .modal-body .meta{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:14px;color:var(--subtext)}
  .modal-body .meta .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .modal-body .memo{margin-top:18px;font-size:15px;line-height:1.7;opacity:.92;white-space:pre-wrap}
  .modal-body .tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px;padding-top:18px;border-top:1px solid var(--hair)}
  .modal-body .tags span{padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:500;background:var(--glassBg);border:1px solid var(--glassBorder);color:var(--subtext)}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
    .blobs{display:none}
  }
</style>
</head>
<body>

<div class="blobs"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>

<div class="wrap">
  <div class="bar">
    <button class="menu-btn" id="menuBtn" aria-label="메뉴 열기">☰</button>
    <div class="brand" id="brand"></div>
    <div class="filter-label"><span class="dot"></span><span id="filterLabel">전체</span></div>
  </div>

  <main>
    <div class="hero">
      <div class="kicker" id="kicker"></div>
      <h1 id="heroTitle"></h1>
      <p id="heroSub"></p>
      <button class="back" id="backBtn" style="display:none">← 전체 갤러리로</button>
    </div>

    <div class="searchrow">
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--subtext)" stroke-width="2.2" style="flex:none"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
        <input id="search" placeholder="제목 · 캐릭터 · 태그 검색" />
        <button class="clear" id="clearBtn" style="display:none">✕</button>
      </div>
    </div>

    <div class="controls" id="controls"></div>
    <div class="count" id="count"></div>
    <div class="grid-wrap" id="gridWrap"></div>
  </main>
</div>

<script>
document.getElementById('brand').textContent = SITE.brand;

const enc = p => p.split('/').map(encodeURIComponent).join('/');
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function splitFolder(folder){
  const m = folder.match(/^(.*?)\s*[\(（](.+?)[\)）]\s*$/);
  if(m) return { main:m[1].trim(), sub:m[2].trim() };
  return { main:folder, sub:'' };
}

let ITEMS=[], MENU=[], ALLTAGS=[];
const S={ cat:'home', query:'', tags:[], sortDesc:true, drawerOpen:false, modalIdx:null, view:[] };

Promise.all([
  fetch('gallery.json').then(r=>r.ok?r.json():Promise.reject()).catch(()=>null),
  fetch('info.json').then(r=>r.ok?r.json():{}).catch(()=>({})),
]).then(([gallery, info])=>{
  const chars=(gallery&&gallery.characters)||[];
  chars.forEach(ch=>{
    const parts=splitFolder(ch.folder);
    const cInfo=info[ch.folder]||info[ch.name]||{};
    ch.images.forEach((img,i)=>{
      const file=(img&&typeof img==='object')?img.file:img;
      const ts=(img&&typeof img==='object'&&typeof img.ts==='number')?img.ts:0;
      const meta=cInfo[file]||{};
      const tags=Array.isArray(meta.tags)?meta.tags.map(t=>String(t).replace(/^#/,'').trim()).filter(Boolean):[];
      ITEMS.push({
        folder:ch.folder, main:parts.main, sub:parts.sub, file,
        src:'images/'+enc(ch.folder+'/'+file),
        title:meta.title||'', memo:meta.memo||'', tags,
        seq:i, ts,
      });
    });
  });
  // menu
  MENU=[{key:'home',main:'Home',sub:'전체 일러스트',count:ITEMS.length}];
  chars.forEach(ch=>{
    const parts=splitFolder(ch.folder);
    MENU.push({key:ch.folder,main:parts.main,sub:parts.sub||'미공개 컷 모음',count:ch.images.length});
  });
  // global tags by frequency
  const freq={};
  ITEMS.forEach(it=>it.tags.forEach(t=>freq[t]=(freq[t]||0)+1));
  ALLTAGS=Object.keys(freq).sort((a,b)=>freq[b]-freq[a]||a.localeCompare(b));
  render();
});

function currentList(){
  let list=ITEMS.slice();
  if(S.cat!=='home') list=list.filter(i=>i.folder===S.cat);
  const q=S.query.trim().toLowerCase();
  if(q) list=list.filter(i=>(i.title+' '+i.main+' '+i.sub+' '+i.memo+' '+i.tags.join(' ')+' '+i.file).toLowerCase().includes(q));
  if(S.tags.length) list=list.filter(i=>S.tags.every(t=>i.tags.includes(t)));
  list.sort((a,b)=>{
    if(a.ts!==b.ts) return S.sortDesc ? b.ts-a.ts : a.ts-b.ts;
    return a.file.localeCompare(b.file);
  });
  return list;
}

function render(){
  // hero
  const notHome=S.cat!=='home';
  document.getElementById('backBtn').style.display=notHome?'inline-block':'none';
  document.getElementById('kicker').textContent=notHome?'CHARACTER':'ZETA PLOT GALLERY';
  document.getElementById('filterLabel').textContent=notHome?splitFolder(S.cat).main:'전체';
  if(notHome){
    const p=splitFolder(S.cat);
    document.getElementById('heroTitle').textContent=p.main;
    document.getElementById('heroSub').textContent=p.sub||'이 캐릭터의 미공개 컷 모음입니다.';
  }else{
    document.getElementById('heroTitle').textContent=SITE.title;
    document.getElementById('heroSub').textContent=SITE.subtitle;
  }

  // controls: tag chips + sort
  const ctr=document.getElementById('controls');
  ctr.innerHTML='';
  ALLTAGS.forEach(t=>{
    const b=document.createElement('button');
    b.className='chip'+(S.tags.includes(t)?' on':'');
    b.textContent='#'+t;
    b.onclick=()=>{S.tags=S.tags.includes(t)?S.tags.filter(x=>x!==t):S.tags.concat(t);render();};
    ctr.appendChild(b);
  });
  if(ITEMS.length){
    const sb=document.createElement('button');
    sb.className='sortbtn';
    sb.innerHTML=(S.sortDesc?'↓ 최신순':'↑ 오래된순');
    sb.onclick=()=>{S.sortDesc=!S.sortDesc;render();};
    ctr.appendChild(sb);
  }

  const list=currentList();
  S.view=list;
  document.getElementById('count').textContent=ITEMS.length?(list.length+'개의 일러스트'):'';

  const gw=document.getElementById('gridWrap');
  gw.innerHTML='';
  if(!ITEMS.length){
    gw.innerHTML='<div class="empty"><div class="ic">◍</div><div class="h">아직 올라온 일러스트가 없어요</div><div class="s"><code>images</code> 폴더 안에 캐릭터 이름으로 폴더를 만들고<br>(예: <code>images/차서진(부제)</code>) 그 안에 이미지를 넣어주세요.</div></div>';
    return;
  }
  if(!list.length){
    gw.innerHTML='<div class="empty"><div class="ic">◍</div><div class="h">해당하는 일러스트가 없어요</div><div class="s">검색어나 태그 필터를 바꿔보세요.</div></div>';
    return;
  }
  const grid=document.createElement('div');
  grid.className='grid';
  list.forEach((it,idx)=>{
    const card=document.createElement('div');
    card.className='card';card.tabIndex=0;card.setAttribute('role','button');
    const cap=(it.title||it.memo)
      ? '<div class="cap"><div class="t">'+esc(it.title||it.main)+'</div><div class="m">'+esc(it.main)+(it.title?'':'')+'</div></div>'
      : '';
    card.innerHTML='<img src="'+it.src+'" alt="'+esc(it.title||it.main)+'" loading="lazy">'+cap;
    card.onclick=()=>openModal(idx);
    card.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openModal(idx);}};
    grid.appendChild(card);
  });
  gw.appendChild(grid);
}

/* modal */
function openModal(i){S.modalIdx=i;drawModal();document.body.style.overflow='hidden';}
function closeModal(){S.modalIdx=null;const el=document.getElementById('modalScrim');if(el)el.remove();document.body.style.overflow='';}
function stepModal(d){if(S.modalIdx===null)return;S.modalIdx=(S.modalIdx+d+S.view.length)%S.view.length;drawModal();}
function drawModal(){
  const it=S.view[S.modalIdx];if(!it)return;
  let el=document.getElementById('modalScrim');
  if(!el){
    el=document.createElement('div');el.id='modalScrim';el.className='modal-scrim';
    el.onclick=e=>{if(e.target===el)closeModal();};
    document.body.appendChild(el);
  }
  const story=it.sub?('『 '+esc(it.sub)+' 』'):'미공개 일러스트';
  const metaBits=[esc(it.main)];
  const meta='<div class="meta"><span class="dot"></span>'+esc(it.main)+'</div>';
  const memo=it.memo?'<p class="memo">'+esc(it.memo)+'</p>':'';
  const tags=it.tags.length?('<div class="tags">'+it.tags.map(t=>'<span>#'+esc(t)+'</span>').join('')+'</div>'):'';
  const nav=S.view.length>1
    ? '<button class="modal-nav prev" id="mPrev" aria-label="이전">‹</button><button class="modal-nav next" id="mNext" aria-label="다음">›</button>'
    : '';
  el.innerHTML=
    '<div class="modal-card">'
    +'<div class="modal-media">'
      +'<img src="'+it.src+'" alt="'+esc(it.title||it.main)+'">'
      +'<button class="modal-close" id="mClose" aria-label="닫기"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg></button>'
      +nav
    +'</div>'
    +'<div class="modal-body">'
      +'<div class="story">'+story+'</div>'
      +'<h2>'+esc(it.title||it.main)+'</h2>'
      +meta
      +memo
      +tags
    +'</div>'
    +'</div>';
  el.querySelector('#mClose').onclick=closeModal;
  const p=el.querySelector('#mPrev'),n=el.querySelector('#mNext');
  if(p)p.onclick=e=>{e.stopPropagation();stepModal(-1);};
  if(n)n.onclick=e=>{e.stopPropagation();stepModal(1);};
}

/* drawer */
function openDrawer(){
  const scrim=document.createElement('div');scrim.className='scrim';scrim.id='scrim';scrim.onclick=closeDrawer;
  const d=document.createElement('div');d.className='drawer';d.id='drawer';
  let html='<div class="dhead"><div><div class="k">MENU</div><div class="tt">캐릭터 갤러리</div></div>'
    +'<button class="dclose" id="dClose" aria-label="닫기"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg></button></div><div class="dlist">';
  MENU.forEach(m=>{
    html+='<button class="mitem'+(S.cat===m.key?' on':'')+'" data-key="'+esc(m.key)+'">'
      +'<span class="col"><span class="nm">'+esc(m.main)+'</span><span class="sb">'+esc(m.sub)+'</span></span>'
      +'<span class="cnt">'+m.count+'</span></button>';
  });
  html+='</div>';d.innerHTML=html;
  document.body.appendChild(scrim);document.body.appendChild(d);document.body.style.overflow='hidden';
  d.querySelector('#dClose').onclick=closeDrawer;
  d.querySelectorAll('.mitem').forEach(b=>b.onclick=()=>{S.cat=b.getAttribute('data-key');closeDrawer();window.scrollTo({top:0});render();});
}
function closeDrawer(){['scrim','drawer'].forEach(id=>{const e=document.getElementById(id);if(e)e.remove();});if(S.modalIdx===null)document.body.style.overflow='';}

document.getElementById('menuBtn').onclick=openDrawer;
document.getElementById('backBtn').onclick=()=>{S.cat='home';window.scrollTo({top:0});render();};
document.getElementById('search').addEventListener('input',e=>{S.query=e.target.value;document.getElementById('clearBtn').style.display=e.target.value?'block':'none';render();});
document.getElementById('clearBtn').onclick=()=>{S.query='';document.getElementById('search').value='';document.getElementById('clearBtn').style.display='none';render();};
document.addEventListener('keydown',e=>{
  if(S.modalIdx!==null){
    if(e.key==='Escape')closeModal();
    else if(e.key==='ArrowLeft')stepModal(-1);
    else if(e.key==='ArrowRight')stepModal(1);
  }else if(e.key==='Escape'){closeDrawer();}
});
</script>
